body:
  text: 抱朴子别旨夫胎精固神與守元氣同但莫止出入之息可也有常以生氣時以鼻引入口吐吐二分餘一分鼓口咽此氣令喉中郁然有聲此非胎元氣是服其粗氣也粗氣在腹與元氣不同居也粗氣是喘息之氣也夫元氣雖至少而難散為有粗氣之出入也且呼吸由不欲自聞况咽有聲乎夫入氣粗則傷肺肺五藏之華蓋氣下先至肺也凡服元氣不隨粗而出入則無有待氣生死之時也既鼓咽外氣入於元氣藏中所以返傷於人也夫人用力者皆用衆氣也謂衆物之氣飲食之品也且衆氣只能舉重致遠運體而已存之不能益人之壽去之不能使人短折何必禁閉也且用氣之術即粗氣也可以移山嶽決河海制虎豹縛賊盜故知衆氣不及粗氣粗氣可去之元氣不可令出也夫保氣者元氣也非衆粗二氣若服元氣滿藏則粗氣自除即自以粗氣運動不必須衆氣也夫休絶者患其穀氣熏蒸五藏是以絶之今既修氣術則穀氣自除縱一日九餐亦不能成患終歲不食亦不能嬴困則知氣之道遠矣哉夫導引不在於立名象物粉繪表形著圖但無名狀也或伸屈或俯仰或行卧或倚立或躑躅或徐步或吟或息皆導引也不必每晨為之但覺身有不理則行之皆當閉氣節其氣衝以通也亦不待立息數待氣似極則先以鼻少引入然口吐出也緣氣閉既久則衝喉若不更引而便以口吐則氣一一粗而傷肺矣如此但疾愈則已不可使身汗有汗則受風以搖動故也凡人導引骨節有聲如不引則聲大聲小則筋緩氣通也夫導引療末患之患通不和之氣動之則百關氣暢閉之則三宫血凝實養生之大律祛疾之玄術矣抱朴子别旨
